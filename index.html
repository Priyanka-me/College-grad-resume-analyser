<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

let reportText = "";

async function extractPDFText(file){
    const reader = new FileReader();
    return new Promise((resolve, reject) => {
        reader.onload = async function() {
            try {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let fullText = "";
                for(let i = 1; i <= pdf.numPages; i++){
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    const strings = content.items.map(item => item.str);
                    fullText += strings.join(" ") + " ";
                }
                resolve(fullText.toLowerCase());
            } catch(error) {
                reject(error);
            }
        };
        reader.readAsArrayBuffer(file);
    });
}

async function analyzeResume(){
    let name = document.getElementById("name").value.trim() || "Not Provided";
    let whatsapp = document.getElementById("whatsapp").value.trim() || "Not Provided";
    let targetRole = document.getElementById("targetRole").value;
    let resumeFile = document.getElementById("resume").files[0];

    if(!resumeFile){
        alert("Please upload resume PDF");
        return;
    }

    // ROLE KEYWORDS
    const roleKeywords = {
        "Frontend Developer": ["html","css","javascript","react","redux","tailwind css","bootstrap","typescript","next.js","responsive design"],
        "Backend Developer": ["node.js","express.js","mongodb","sql","rest api","jwt","authentication","docker","microservices","backend"],
        "Full Stack Developer": ["html","css","javascript","react","node.js","mongodb","sql","express.js","aws","rest api"],
        "Software Engineer": ["java","python","sql","algorithms","data structures","oops","debugging","git","problem solving","software development"],
        "Data Analyst": ["excel","sql","power bi","tableau","python","analytics","dashboard","statistics","data visualization","business intelligence"],
        "Data Scientist": ["python","machine learning","deep learning","tensorflow","numpy","pandas","statistics","predictive analytics","sql","data visualization"],
        "AI Engineer": ["python","llm","prompt engineering","machine learning","deep learning","nlp","openai","generative ai","tensorflow","ai"],
        "UI UX Designer": ["figma","wireframe","prototype","user research","interaction design","ui design","ux design","design thinking","adobe xd","usability testing"],
        "Digital Marketing Executive": ["seo","google ads","meta ads","social media marketing","content marketing","performance marketing","email marketing","google analytics","keyword research","lead generation"],
        "Financial Analyst": ["financial modeling","valuation","forecasting","budgeting","excel","accounting","finance","financial reporting","analysis","power bi"],
        "HR Executive": ["recruitment","talent acquisition","hrms","employee engagement","screening","onboarding","communication","payroll","interviewing","hr operations"],
        "School Teacher": ["lesson planning","classroom management","curriculum development","student engagement","assessment","teaching","communication","presentation","subject expertise","learning methods"]
    };

    // DEFAULT KEYWORDS
    let targetKeywords = roleKeywords[targetRole] || [
        "communication","leadership","problem solving","teamwork","time management","critical thinking","presentation skills","analytical skills","adaptability","project management"
    ];

    // EXTRACT RESUME TEXT
    let resumeText = await extractPDFText(resumeFile);

    // DETECTED KEYWORDS
    let foundKeywords = [];
    let recommendedKeywords = [];

    targetKeywords.forEach(keyword => {
        if(resumeText.includes(keyword.toLowerCase())){
            foundKeywords.push(keyword);
        } else {
            recommendedKeywords.push(keyword);
        }
    });

    // Fallback logic clean up: if they hit a home run, give them generic structural keyword advice instead of repeating matched ones
    if(recommendedKeywords.length === 0){
        recommendedKeywords = ["KPIs", "metrics", "cross-functional collaboration", "agile methodologies"];
    }

    // ACTION WORDS
    const actionWords = ["developed","created","implemented","designed","managed","built","optimized","led","improved","analyzed","executed","automated","collaborated","delivered"];
    let foundActionWords = [];
    actionWords.forEach(word => {
        if(resumeText.includes(word)){
            foundActionWords.push(word);
        }
    });

    // RESUME SECTIONS
    let sectionsFound = [];
    if(resumeText.includes("education")) sectionsFound.push("Education");
    if(resumeText.includes("project")) sectionsFound.push("Projects");
    if(resumeText.includes("experience")) sectionsFound.push("Experience");
    if(resumeText.includes("skills")) sectionsFound.push("Skills");
    if(resumeText.includes("certification")) sectionsFound.push("Certifications");
    if(resumeText.includes("internship")) sectionsFound.push("Internships");

    // ATS SCORE CALCULATION
    let atsScore = 35;
    atsScore += foundKeywords.length * 4;
    atsScore += foundActionWords.length * 2;
    atsScore += sectionsFound.length * 4;

    if(resumeText.includes("@")) atsScore += 5;
    if(/\d{10}/.test(resumeText)) atsScore += 5;
    if(resumeText.includes("linkedin")) atsScore += 5;
    if(resumeText.includes("github")) atsScore += 5;

    if(atsScore > 100) atsScore = 100;

    // ATS LEVEL
    let atsLevel = "";
    if(atsScore >= 85) atsLevel = "Excellent ATS Ready Resume";
    else if(atsScore >= 70) atsLevel = "Good Resume but needs optimization";
    else if(atsScore >= 50) atsLevel = "Average Resume with ATS gaps";
    else atsLevel = "Poor ATS Resume";

    // IMPROVEMENTS
    let suggestions = [
        "Add more ATS keywords related to " + (targetRole || "your target role"),
        "Use measurable achievements with percentages and numbers",
        "Improve resume summary using target role keywords",
        "Use stronger action verbs like Developed, Led, and Built",
        "Add certifications relevant to target role",
        "Improve project descriptions with business impact",
        "Add GitHub and LinkedIn profile links"
    ];

    // DISPLAY HTML OUTPUT
    let output = `
    <div class="card">
        <h2>Candidate Information</h2>
        <p><strong>Name:</strong> ${name}</p>
        <p><strong>WhatsApp:</strong> ${whatsapp}</p>
        <p><strong>Target Role:</strong> ${targetRole || "Not Selected"}</p>
    </div>
    <div class="card">
        <h2>ATS Resume Score</h2>
        <p class="score">${atsScore}%</p>
        <p><strong>${atsLevel}</strong></p>
    </div>
    <div class="card">
        <h2>Detected Resume Sections</h2>
        <ul>${sectionsFound.map(section => `<li>${section}</li>`).join("")}</ul>
    </div>
    <div class="card">
        <h2>Detected ATS Keywords</h2>
        <ul>${foundKeywords.length > 0 ? foundKeywords.map(keyword => `<li>${keyword}</li>`).join("") : "<li>None detected</li>"}</ul>
    </div>
    <div class="card">
        <h2>Recommended ATS Keywords</h2>
        <ul>${recommendedKeywords.slice(0,10).map(keyword => `<li>${keyword}</li>`).join("")}</ul>
    </div>
    <div class="card">
        <h2>Detected Action Words</h2>
        <ul>${foundActionWords.length > 0 ? foundActionWords.map(word => `<li>${word}</li>`).join("") : "<li>None detected</li>"}</ul>
    </div>
    <div class="card">
        <h2>Resume Improvements Needed</h2>
        <ul>${suggestions.map(suggestion => `<li>${suggestion}</li>`).join("")}</ul>
    </div>`;

    document.getElementById("output").innerHTML = output;
    document.getElementById("result").style.display = "block";

    // GENERATE PLAINTEXT REPORT FOR PDF
    reportText = `AI RESUME ATS ANALYSIS REPORT
----------------------------------------
Candidate Name:
${name}

WhatsApp Number:
${whatsapp}

Target Role:
${targetRole || "Not Selected"}
----------------------------------------
ATS Resume Score:
${atsScore}%

Status: ${atsLevel}
----------------------------------------
Detected Resume Sections:
${sectionsFound.length > 0 ? sectionsFound.join(", ") : "None"}

----------------------------------------
Detected ATS Keywords:
${foundKeywords.length > 0 ? foundKeywords.join(", ") : "None"}

----------------------------------------
Recommended ATS Keywords:
${recommendedKeywords.join(", ")}

----------------------------------------
Detected Action Words:
${foundActionWords.length > 0 ? foundActionWords.join(", ") : "None"}

----------------------------------------
Resume Improvements Needed:
${suggestions.join("\n")}
`;

    window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
    });
}

function downloadPDF(){
    if(reportText === ""){
        alert("Please analyze resume first");
        return;
    }
    try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica");
        doc.setFontSize(12);

        const lines = doc.splitTextToSize(reportText, 180);
        let y = 20;

        for(let i = 0; i < lines.length; i++){
            if(y > 280){
                doc.addPage();
                y = 20;
            }
            doc.text(lines[i], 15, y);
            y += 7;
        }

        const pdfData = doc.output('datauristring');
        const link = document.createElement('a');
        link.href = pdfData;
        link.download = 'ATS_Report.pdf';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    } catch(error) {
        console.error(error);
        alert("Download failed");
    }
}
</script>
